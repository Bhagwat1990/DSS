spring.application.name=dss

# Server
server.port=8080

# QuestDB (via PostgreSQL wire protocol, default port 8812)
spring.datasource.url=jdbc:postgresql://localhost:8812/qdb
spring.datasource.username=admin
spring.datasource.password=quest
spring.datasource.driver-class-name=org.postgresql.Driver

# Gemini API (set your key here or via env variable GEMINI_API_KEY)
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# Stock API - Alpha Vantage (set your key or via env variable ALPHA_VANTAGE_API_KEY)
alpha-vantage.api.key=${ALPHA_VANTAGE_API_KEY:YOUR_ALPHA_VANTAGE_KEY}
alpha-vantage.api.url=https://www.alphavantage.co/query

# Groww API
groww.api.base-url=https://groww.in/v1/api
groww.api.auth-token=${GROWW_AUTH_TOKEN:YOUR_GROWW_AUTH_TOKEN}
